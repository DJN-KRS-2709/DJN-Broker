name: Automated Trading Bot

on:
  schedule:
    # Every 2 hours during market hours: 8am-10pm CET (7,9,11,13,15,17,19,21 UTC)
    - cron: '0 7,9,11,13,15,17,19,21 * * *'
  
  # Allow manual trigger anytime
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Download NLTK data
      run: |
        python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"
        
    - name: Create .env file
      run: |
        echo "REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}" >> .env
        echo "REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}" >> .env
        echo "REDDIT_USER_AGENT=${{ secrets.REDDIT_USER_AGENT }}" >> .env
        echo "NEWSAPI_KEY=${{ secrets.NEWSAPI_KEY }}" >> .env
        echo "ALPACA_PAPER_API_KEY=${{ secrets.ALPACA_PAPER_API_KEY }}" >> .env
        echo "ALPACA_PAPER_API_SECRET=${{ secrets.ALPACA_PAPER_API_SECRET }}" >> .env
        echo "ALPACA_LIVE_API_KEY=${{ secrets.ALPACA_LIVE_API_KEY }}" >> .env
        echo "ALPACA_LIVE_API_SECRET=${{ secrets.ALPACA_LIVE_API_SECRET }}" >> .env
        echo "NOTIFICATION_EMAIL=${{ secrets.NOTIFICATION_EMAIL }}" >> .env
        echo "SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}" >> .env
        echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
        
    - name: Create storage directory
      run: mkdir -p storage/learning storage/data_archive
      
    - name: Restore storage data
      uses: actions/cache@v4
      with:
        path: storage
        key: trading-bot-storage
        
    - name: Run trading bot
      run: python main.py
      
    - name: Save storage data
      uses: actions/cache@v4
      with:
        path: storage
        key: trading-bot-storage
        
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-logs-${{ github.run_number }}
        path: |
          storage/
        retention-days: 30
        
    - name: Notify on failure
      if: failure()
      run: echo "Trading bot failed! Check logs."

